<html>
    <head>
        <script>
            function viewDateTime(){
                document.getElementById("demo").innerHTML = Date();
            }
            function tellHello(){
                //document.getElementById('demo').innerHTML = "Hello";
                alert("Hay mucho ruido en clase");
                console.log("Hay mucha calor aquí");
            }
            function menor(){
                document.getElementById('demo').style.fontSize = "35px";
            }
            function mayor(){
                document.getElementById('demo').style.fontSize = "50px";
            }
        </script>
    </head>
    <body>
        <h1>My first Javascript</h1>
        <button type="button" onclick="viewDateTime()">Click me to display Date and Time</button>
        
        <button type="button" onclick="tellHello()">Click me to tell Hello</button>

        <button type="button" onclick="menor()">Click me to 35px</button>
        
        <button type="button" onclick="mayor()">Click me to 50px</button>
        
        <p id="demo"></p>
    </body>
</html>
